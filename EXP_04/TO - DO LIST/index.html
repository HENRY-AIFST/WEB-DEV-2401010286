<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To‑Do List with E‑mail Reminder</title>
  <link rel="stylesheet" href="style.css">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@2.4.1/dist/email.min.js"></script>
</head>
<body>

<div class="container">
  <h1>📋 To‑Do List</h1>

  <!-- Form to add a new task -->
  <form id="taskForm">
    <input type="text" id="taskTitle" placeholder="Task title" required>
    <textarea id="taskDesc" placeholder="Description (optional)" rows="2"></textarea>
    <input type="datetime-local" id="taskDate" required>
    <input type="email" id="taskEmail" placeholder="Your email for reminder" required>
    <button type="submit">Add Task</button>
  </form>

  <!-- List of tasks -->
  <ul id="taskList"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
